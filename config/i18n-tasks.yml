# config/i18n-tasks.yml
# nnnl.ca host app — most translations are provided by the better_together CE gem at runtime.
# - data.read/write scoped to app's own locale files only (avoids check-normalized false
#   positives on read-only gem locale paths)
# - ignore_missing covers CE-provided namespaces (better_together.*, devise.*, etc.)
# - ignore_unused: '*' — CE views use these keys; static scan can't detect them
base_locale: en

locales:
  - en
  - es
  - fr
  - uk

data:
  read:
    - 'config/locales/%{locale}.yml'
    - 'config/locales/**/%{locale}.yml'
  write:
    - 'config/locales/%{locale}.yml'

search:
  paths:
    - app/views
  exclude:
    - 'test/**'
    - 'spec/**'
    - 'tmp/**'
    - 'log/**'

translation:
  backend: openai
  openai_model: gpt-4o-mini-2024-07-18

ignore_missing:
  - '{translation_en,translation_es,translation_fr,translation_uk}.*'  # Mobility virtual locales
  - 'better_together.*'
  - 'devise.*'
  - 'doorkeeper.*'
  - 'activerecord.*'
  - 'errors.*'
  - 'helpers.*'
  - 'date.*'
  - 'datetime.*'
  - 'number.*'
  - 'support.*'
  - 'time.*'

ignore_unused:
  - '*'
